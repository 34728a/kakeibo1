<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>家計簿アプリ</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f6fa;
  margin: 0;
  padding: 10px;
}

h1 {
  text-align: center;
}

 .card{
  background: #fff0f5;
  padding: 10px;
  border-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0,2);
}

input, select {
  width: 100%;
  padding: 10px;
  border: none;
  background: #fffff0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #FFCCE5;
  color: white;
  border-radius: 10px;
  font-size: 13px;
}

li {
  list-style: none;
  padding: 8px;
  text-align: center;
}
</style>

</head>

<h1>💰　家計簿</h1>

<div class="card">
  <input id="item" placeholder="項目">

  <select id="category">
    <option>食費</option>
    <option>交通費</option>
    <option>娯楽</option>
    <option>その他</option>
  </select>

  <input id="price" placeholder="金額">
  <button onclick="add()">追加</button>
</div>

<select id="pay">
  <option>現金</option>
  <option>クレカ</option>
  <option>電子マネー</option>
</select>

<div class="card">
  <h3>履歴</h3>
  <ul id="list"></ul>
</div>

<div class="card total">
  合計:<span id="total">0</span>円
</div>

<script>
let data = [];
let total = 0;

window.onload = () =>{
  const saved = localStorage.getItem("kakeibo");
  if (saved){
   data = JSON.parse(saved);
   render();
  }
};

function add(){
  const item = document.getElementById("item").value;
  const price = Number(document.getElementById("price").value);
  const category = document.getElementById("category").value;
  const pay = document.getElementById("pay").value;

  const date = new Date().toLocaleDateString("ja-JP");

  data.push({ item, price, category, date, pay });

  localStorage.setItem("kakeibo",JSON.stringify(data));

  render();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";
  total = 0;

  data.forEach((d, index) => {
    const li = document.createElement("li");
    li.innerHTML = `
      [${d.category}] ${d.item} : ${d.price}円 (${d.date}) / ${d.pay}
    `;

    // カテゴリ色分け
    if(d.category === "食費"){
      li.style.background = "#ffd1e8";
    }else if(d.category === "交通費"){
      li.style.background = "#ffd1d1";
    }else if(d.category === "娯楽"){
      li.style.background = "#ffd1ff";
    }else {
      li.style.background = "#ff93c9";
    }

    // 削除ボタン
    const del = document.createElement("button");
    del.textContent = "削除";
    del.style.marginLeft = "10px";
    del.onclick = () => {
      data.splice(index, 1);
      localStorage.setItem("kakeibo", JSON.stringify(data));
      render();
    };

    // 編集ボタン
    const editBtn = document.createElement("button");
    editBtn.textContent = "編集";
    editBtn.style.marginLeft = "10px";
    editBtn.onclick = () => openEdit(index);

    li.appendChild(del);
    li.appendChild(editBtn);
    list.appendChild(li);

    total += d.price;
  });

  document.getElementById("total").textContent = total;
}

let editIndex = null;

function openEdit(index){
  editIndex = index;
  const d = data[index];

  document.getElementById("edit_item").value = d.item;
  document.getElementById("edit_price").value = d.price;
  document.getElementById("edit_category").value = d.category;
  document.getElementById("edit_date").value = d.date.replace(/\//g, "-");
  document.getElementById("edit_pay").value = d.pay;

  document.getElementById("editWindow").style.display = "block";
}

function closeEdit(){
  document.getElementById("editWindow").style.display = "none";
}

function saveEdit(){
  const item = document.getElementById("edit_item").value;
  const price = Number(document.getElementById("edit_price").value);
  const category = document.getElementById("edit_category").value;
  const date = document.getElementById("edit_date").value;
  const pay = document.getElementById("edit_pay").value;

  data[editIndex] = { item, price, category, date, pay };

  localStorage.setItem("kakeibo", JSON.stringify(data));
  closeEdit();
  render();
}

function getMonthlyTotal(year, month){
  return data
    .filter(d => {
      const [y, m] = d.date.split("/");
      return Number(y) === year && Number(m) === month;
    })
    .reduce((sum, d) => sum + d.price, 0);
}

</script>



<div id="editWindow" style="
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#ffe6f2;
  padding:20px;
  box-shadow:0 -4px 10px rgba(0,0,0,0.2);
  border-radius:20px 20px 0 0;
">
  <h3 style="text-align:center;">編集</h3>

  <input id="edit_item" placeholder="項目">
  <input id="edit_price" placeholder="金額">
  <select id="edit_category">
    <option>食費</option>
    <option>交通費</option>
    <option>娯楽</option>
    <option>その他</option>
  </select>
  <input id="edit_date" type="date">
  <select id="edit_pay">
    <option>現金</option>
    <option>クレカ</option>
    <option>電子マネー</option>
  </select>

  <button onclick="saveEdit()" style="margin-top:10px;">保存</button>
  <button onclick="closeEdit()" style="background:#aaa;margin-top:5px;">閉じる</button>
</div>

</html>
